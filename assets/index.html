<!DOCTYPE html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Host Health</title>
    <link rel="stylesheet" href="/app.css" />
    <script defer src="/alpine.min.js"></script>
  </head>
  <body class="min-h-screen bg-base-200" x-data="app()" x-init="init()" x-cloak>
    <!-- ── Loading gate ─────────────────────────────────────────────── -->
    <template x-if="authed === null">
      <div class="flex min-h-screen items-center justify-center">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    </template>

    <!-- ── Login ────────────────────────────────────────────────────── -->
    <template x-if="authed === false">
      <div class="flex min-h-screen items-center justify-center p-4">
        <div class="card w-full max-w-sm bg-base-100 shadow-xl">
          <form class="card-body" @submit.prevent="login()">
            <h1 class="card-title justify-center text-2xl">🩺 Host Health</h1>
            <p class="text-center text-sm opacity-70">Sign in to continue</p>

            <label class="form-control w-full mt-2">
              <span class="label-text mb-1">Password</span>
              <input
                type="password"
                x-model="password"
                :disabled="busy"
                autofocus
                class="input input-bordered w-full"
                placeholder="••••••••"
              />
            </label>

            <template x-if="loginError">
              <div class="alert alert-error text-sm py-2" x-text="loginError"></div>
            </template>

            <button class="btn btn-primary mt-2" :disabled="busy || !password">
              <span x-show="busy" class="loading loading-spinner loading-sm"></span>
              Sign in
            </button>
          </form>
        </div>
      </div>
    </template>

    <!-- ── Dashboard ────────────────────────────────────────────────── -->
    <template x-if="authed === true">
      <div>
        <div class="navbar bg-base-100 shadow">
          <div class="flex-1 px-2 text-lg font-semibold">🪺 Nestwatch</div>
          <div class="flex-none gap-2">
            <button class="btn btn-info btn-sm" @click="doLock()">🔒 Lock</button>
            <button class="btn btn-warning btn-sm" @click="confirmShutdown = true">⏻ Shut down</button>
            <button class="btn btn-ghost btn-sm" @click="logout()">Log out</button>
          </div>
        </div>

        <main class="mx-auto grid max-w-5xl gap-4 p-4 md:grid-cols-2">
          <!-- Screenshot -->
          <section class="card bg-base-100 shadow">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Screen</h2>
                <div class="flex items-center gap-2">
                  <label class="label cursor-pointer gap-2 py-0">
                    <span class="label-text text-xs">Live</span>
                    <input type="checkbox" class="toggle toggle-primary toggle-sm"
                           x-model="autoRefresh" @change="toggleAutoRefresh()" />
                  </label>
                  <button class="btn btn-primary btn-sm" @click="takeScreenshot()" :disabled="loadingShot">
                    <span x-show="loadingShot" class="loading loading-spinner loading-xs"></span>
                    Take screenshot
                  </button>
                </div>
              </div>
              <div class="mt-2 flex min-h-48 items-center justify-center rounded-lg bg-base-300">
                <template x-if="!shotUrl && !loadingShot">
                  <span class="opacity-50">No screenshot yet</span>
                </template>
                <template x-if="shotUrl">
                  <img :src="shotUrl" alt="screen" class="max-h-96 w-full rounded-lg object-contain" />
                </template>
              </div>
            </div>
          </section>

          <!-- Processes -->
          <section class="card bg-base-100 shadow">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Running apps</h2>
                <button class="btn btn-ghost btn-sm" @click="loadProcesses()" :disabled="loadingProcs">
                  <span x-show="loadingProcs" class="loading loading-spinner loading-xs"></span>
                  Refresh
                </button>
              </div>
              <div class="mt-2 max-h-96 overflow-y-auto">
                <table class="table table-pin-rows table-sm">
                  <thead>
                    <tr><th>App</th><th class="text-right">Memory</th><th></th></tr>
                  </thead>
                  <tbody>
                    <template x-for="p in processes" :key="p.pid">
                      <tr>
                        <td class="truncate" x-text="p.name"></td>
                        <td class="text-right whitespace-nowrap" x-text="fmtBytes(p.memory_bytes)"></td>
                        <td class="text-right">
                          <button class="btn btn-error btn-xs" @click="askKill(p)">Kill</button>
                        </td>
                      </tr>
                    </template>
                    <template x-if="processes.length === 0 && !loadingProcs">
                      <tr><td colspan="3" class="text-center opacity-50">No processes</td></tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Curfew -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Curfew</h2>
                <input type="checkbox" class="toggle toggle-warning" x-model="curfew.enabled" />
              </div>
              <p class="text-sm opacity-70">
                When the PC is on during a closed window, it shuts down (with a warning countdown).
              </p>

              <!-- Simple single window (shown until you add day-specific schedules) -->
              <template x-if="!curfew.windows || curfew.windows.length === 0">
                <div class="mt-2 flex flex-wrap items-end gap-3">
                  <label class="form-control">
                    <span class="label-text mb-1">From</span>
                    <input type="time" x-model="curfew.start" class="input input-bordered" />
                  </label>
                  <label class="form-control">
                    <span class="label-text mb-1">Until</span>
                    <input type="time" x-model="curfew.end" class="input input-bordered" />
                  </label>
                </div>
              </template>

              <!-- Per-day schedules (authoritative when present) -->
              <template x-if="curfew.windows && curfew.windows.length > 0">
                <div class="mt-2 flex flex-col gap-3">
                  <template x-for="(w, i) in curfew.windows" :key="i">
                    <div class="flex flex-wrap items-end gap-2 rounded-lg bg-base-200 p-2">
                      <label class="form-control">
                        <span class="label-text mb-1 text-xs">From</span>
                        <input type="time" x-model="w.start" class="input input-bordered input-sm" />
                      </label>
                      <label class="form-control">
                        <span class="label-text mb-1 text-xs">Until</span>
                        <input type="time" x-model="w.end" class="input input-bordered input-sm" />
                      </label>
                      <div class="flex items-end gap-1">
                        <template x-for="d in ['mon','tue','wed','thu','fri','sat','sun']" :key="d">
                          <label class="flex flex-col items-center text-xs">
                            <span class="uppercase opacity-70" x-text="d[0]"></span>
                            <input type="checkbox" class="checkbox checkbox-xs" x-model="w.days[d]" />
                          </label>
                        </template>
                      </div>
                      <button class="btn btn-ghost btn-xs" @click="removeWindow(i)">✕</button>
                    </div>
                  </template>
                  <p class="text-xs opacity-60">No day selected = every day.</p>
                </div>
              </template>

              <div class="mt-3 flex flex-wrap items-end gap-3">
                <button class="btn btn-ghost btn-sm" @click="addWindow()">+ Add day schedule</button>
                <label class="form-control">
                  <span class="label-text mb-1">Warning (sec)</span>
                  <input type="number" min="0" max="600" x-model.number="curfew.warn_secs"
                         class="input input-bordered w-28" />
                </label>
                <button class="btn btn-primary" @click="saveCurfew()" :disabled="savingCurfew">
                  <span x-show="savingCurfew" class="loading loading-spinner loading-sm"></span>
                  Save
                </button>
              </div>
            </div>
          </section>

          <!-- Today's screen time (live tally) -->
          <section class="card bg-base-100 shadow md:col-span-2"
                   x-show="today.budget_mins > 0 || (today.per_app && today.per_app.length) || (today.groups && today.groups.length)">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">
                  Today's screen time
                  <span class="badge badge-warning badge-sm" x-show="today.enabled === false">Paused</span>
                </h2>
                <button class="btn btn-ghost btn-sm" @click="loadToday()" :disabled="loadingToday">
                  <span x-show="loadingToday" class="loading loading-spinner loading-xs"></span>
                  Refresh
                </button>
              </div>

              <!-- Total budget bar -->
              <template x-if="today.budget_mins > 0">
                <div class="mt-1">
                  <div class="flex justify-between text-sm">
                    <span><span class="font-semibold" x-text="today.used_mins"></span> of
                      <span x-text="today.budget_mins"></span> min used</span>
                    <span class="opacity-70"><span x-text="today.remaining_mins"></span> min left<span
                      x-show="today.extra_mins > 0" x-text="` (incl. +${today.extra_mins} bonus)`"></span></span>
                  </div>
                  <progress class="progress w-full mt-1"
                            :class="today.remaining_mins === 0 ? 'progress-error' : (today.remaining_mins <= 15 ? 'progress-warning' : 'progress-primary')"
                            :value="today.used_mins" :max="today.budget_mins"></progress>
                </div>
              </template>

              <!-- Parent-granted bonus time (only meaningful with a budget) -->
              <div class="mt-2 flex flex-wrap items-center gap-2" x-show="today.budget_mins > 0">
                <span class="label-text">Add bonus time today:</span>
                <button class="btn btn-outline btn-sm" @click="grantExtra(15)" :disabled="grantingExtra">+15</button>
                <button class="btn btn-outline btn-sm" @click="grantExtra(30)" :disabled="grantingExtra">+30</button>
                <button class="btn btn-outline btn-sm" @click="grantExtra(60)" :disabled="grantingExtra">+60</button>
              </div>

              <!-- Per-app usage -->
              <template x-if="today.per_app && today.per_app.length">
                <div class="mt-2">
                  <span class="label-text">Per-app usage today</span>
                  <div class="mt-1 flex flex-col gap-1">
                    <template x-for="a in today.per_app" :key="a.name">
                      <div class="flex items-center gap-2 text-sm">
                        <span class="w-48 truncate" x-text="a.name"></span>
                        <progress class="progress flex-1"
                                  :class="a.used_mins >= a.limit_mins ? 'progress-error' : 'progress-primary'"
                                  :value="a.used_mins" :max="a.limit_mins"></progress>
                        <span class="whitespace-nowrap opacity-70"><span x-text="a.used_mins"></span>/<span
                          x-text="a.limit_mins"></span> min</span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Group (shared pool) usage -->
              <template x-if="today.groups && today.groups.length">
                <div class="mt-2">
                  <span class="label-text">App groups today</span>
                  <div class="mt-1 flex flex-col gap-1">
                    <template x-for="g in today.groups" :key="g.name">
                      <div class="flex items-center gap-2 text-sm">
                        <span class="w-48 truncate" x-text="g.name"></span>
                        <progress class="progress flex-1"
                                  :class="g.used_mins >= g.limit_mins ? 'progress-error' : 'progress-primary'"
                                  :value="g.used_mins" :max="g.limit_mins"></progress>
                        <span class="whitespace-nowrap opacity-70"><span x-text="g.used_mins"></span>/<span
                          x-text="g.limit_mins"></span> min</span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </section>

          <!-- Usage rules: budget + blocklist + per-app limits -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Screen-time &amp; app limits</h2>
                <label class="flex items-center gap-2 cursor-pointer">
                  <span class="label-text" x-text="rules.enabled ? 'Enforcing' : 'Paused'"></span>
                  <input type="checkbox" class="toggle toggle-sm toggle-primary"
                         :checked="rules.enabled"
                         @change="rules.enabled = $event.target.checked; saveRules()" />
                </label>
              </div>
              <p class="text-sm opacity-70" x-show="!rules.enabled">
                Paused — screen-time, blocked apps, and per-app limits are not enforced (curfew still applies).
              </p>

              <!-- Daily budget -->
              <label class="flex w-fit items-center gap-2 mt-1 cursor-pointer">
                <input type="checkbox" class="checkbox checkbox-sm"
                       :checked="!!rules.budget_by_weekday" @change="togglePerDay($event.target.checked)" />
                <span class="label-text">Different limit each day</span>
              </label>

              <div class="mt-1 flex flex-wrap items-end gap-3">
                <label class="form-control" x-show="!rules.budget_by_weekday">
                  <span class="label-text mb-1">Daily limit (min, 0 = off)</span>
                  <input type="number" min="0" x-model.number="rules.daily_budget_mins"
                         class="input input-bordered w-40" />
                </label>
                <label class="form-control">
                  <span class="label-text mb-1">When time's up</span>
                  <select x-model="rules.budget_action" class="select select-bordered">
                    <option value="lock">Lock screen</option>
                    <option value="shutdown">Shut down</option>
                    <option value="warn">Warn only</option>
                  </select>
                </label>
                <label class="form-control">
                  <span class="label-text mb-1">Warning (sec)</span>
                  <input type="number" min="0" max="600" x-model.number="rules.warn_secs"
                         class="input input-bordered w-28" />
                </label>
              </div>

              <!-- Per-day limits. `x-if` (not x-show) so the inputs aren't evaluated as
                   null[i] while per-day mode is off. -->
              <template x-if="rules.budget_by_weekday">
                <div class="mt-2">
                  <div class="flex flex-wrap gap-2">
                    <template x-for="(d, i) in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']" :key="i">
                      <label class="form-control">
                        <span class="label-text mb-1 text-center" x-text="d"></span>
                        <input type="number" min="0" x-model.number="rules.budget_by_weekday[i]"
                               class="input input-bordered input-sm w-16 text-center" />
                      </label>
                    </template>
                  </div>
                  <p class="text-xs opacity-60 mt-1">
                    0 = no limit that day. To block a day entirely, use a full-day curfew window.
                  </p>
                </div>
              </template>

              <!-- Blocked apps -->
              <div class="mt-3">
                <span class="label-text">Blocked apps (killed on sight)</span>
                <div class="mt-1 flex flex-col gap-1">
                  <template x-for="(b, i) in rules.blocklist" :key="i">
                    <div class="flex items-center gap-2">
                      <input type="text" x-model="rules.blocklist[i]" placeholder="game.exe"
                             class="input input-bordered input-sm w-64" />
                      <button class="btn btn-ghost btn-xs" @click="rules.blocklist.splice(i, 1)">✕</button>
                    </div>
                  </template>
                  <button class="btn btn-ghost btn-sm w-fit" @click="rules.blocklist.push('')">+ Add app</button>
                </div>
              </div>

              <!-- Per-app limits -->
              <div class="mt-3">
                <span class="label-text">Per-app daily limits</span>
                <div class="mt-1 flex flex-col gap-1">
                  <template x-for="(row, i) in appLimitRows" :key="i">
                    <div class="flex items-center gap-2">
                      <input type="text" x-model="row.name" placeholder="chrome.exe"
                             class="input input-bordered input-sm w-64" />
                      <input type="number" min="0" x-model.number="row.mins" placeholder="min"
                             class="input input-bordered input-sm w-24" />
                      <button class="btn btn-ghost btn-xs" @click="appLimitRows.splice(i, 1)">✕</button>
                    </div>
                  </template>
                  <button class="btn btn-ghost btn-sm w-fit"
                          @click="appLimitRows.push({ name: '', mins: 60 })">+ Add limit</button>
                </div>
              </div>

              <!-- App groups (shared pool) -->
              <div class="mt-3">
                <span class="label-text">App groups (shared daily pool)</span>
                <div class="mt-1 flex flex-col gap-1">
                  <template x-for="(g, i) in groupRows" :key="i">
                    <div class="flex flex-wrap items-center gap-2">
                      <input type="text" x-model="g.name" placeholder="Games"
                             class="input input-bordered input-sm w-32" />
                      <input type="text" x-model="g.appsText" placeholder="minecraft.exe, roblox.exe"
                             class="input input-bordered input-sm w-64" />
                      <input type="number" min="0" x-model.number="g.limit_mins" placeholder="min"
                             class="input input-bordered input-sm w-24" />
                      <button class="btn btn-ghost btn-xs" @click="groupRows.splice(i, 1)">✕</button>
                    </div>
                  </template>
                  <button class="btn btn-ghost btn-sm w-fit"
                          @click="groupRows.push({ name: '', appsText: '', limit_mins: 90 })">+ Add group</button>
                </div>
              </div>

              <div class="mt-3">
                <button class="btn btn-primary" @click="saveRules()" :disabled="savingRules">
                  <span x-show="savingRules" class="loading loading-spinner loading-sm"></span>
                  Save
                </button>
              </div>
            </div>
          </section>

          <!-- More-time requests -->
          <section class="card bg-base-100 shadow md:col-span-2" x-show="timeRequests.length > 0">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">
                  More-time requests
                  <span class="badge badge-primary" x-text="timeRequests.length"></span>
                </h2>
                <button class="btn btn-ghost btn-sm" @click="loadTimeRequests()">Refresh</button>
              </div>
              <div class="mt-2 max-h-72 overflow-y-auto">
                <table class="table table-pin-rows table-sm">
                  <thead>
                    <tr><th>Time</th><th>Minutes</th><th>Reason</th><th></th></tr>
                  </thead>
                  <tbody>
                    <template x-for="r in timeRequests" :key="r.id">
                      <tr>
                        <td class="whitespace-nowrap" x-text="fmtTime(r.ts)"></td>
                        <td x-text="r.minutes"></td>
                        <td class="truncate" x-text="r.reason || '—'"></td>
                        <td class="text-right whitespace-nowrap">
                          <button class="btn btn-success btn-xs" @click="resolveTimeRequest(r.id, true)">Approve</button>
                          <button class="btn btn-error btn-xs" @click="resolveTimeRequest(r.id, false)">Deny</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Time codes -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Time codes</h2>
                <button class="btn btn-ghost btn-sm" @click="loadCodes()" :disabled="loadingCodes">
                  <span x-show="loadingCodes" class="loading loading-spinner loading-xs"></span>
                  Refresh
                </button>
              </div>
              <p class="text-sm opacity-70">
                Generate a one-time code worth N minutes and hand it to him — he redeems it on the
                <span class="font-mono">/ask</span> page, even while you're away.
              </p>
              <div class="mt-1 flex flex-wrap items-end gap-2">
                <label class="form-control">
                  <span class="label-text mb-1">Minutes</span>
                  <input type="number" min="1" max="240" x-model.number="newCodeMins"
                         class="input input-bordered w-28" />
                </label>
                <button class="btn btn-primary" @click="issueCode()" :disabled="issuingCode">
                  <span x-show="issuingCode" class="loading loading-spinner loading-sm"></span>
                  Generate code
                </button>
              </div>
              <div class="mt-2 max-h-60 overflow-y-auto" x-show="codes.length > 0">
                <table class="table table-pin-rows table-sm">
                  <thead>
                    <tr><th>Code</th><th>Minutes</th><th>Created</th><th></th></tr>
                  </thead>
                  <tbody>
                    <template x-for="c in codes" :key="c.code">
                      <tr>
                        <td class="font-mono text-base tracking-widest" x-text="c.code"></td>
                        <td x-text="c.minutes"></td>
                        <td class="whitespace-nowrap" x-text="fmtTime(c.ts)"></td>
                        <td class="text-right">
                          <button class="btn btn-ghost btn-xs" @click="copyCode(c.code)">Copy</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <p class="text-sm opacity-50" x-show="codes.length === 0 && !loadingCodes">
                No active codes.
              </p>
            </div>
          </section>

          <!-- Recent access -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Recent access</h2>
                <button class="btn btn-ghost btn-sm" @click="loadAudit()" :disabled="loadingAudit">
                  <span x-show="loadingAudit" class="loading loading-spinner loading-xs"></span>
                  Refresh
                </button>
              </div>
              <p class="text-sm opacity-70">
                Logins and actions on this PC, newest first. Watch for a sign-in you don't recognise.
              </p>
              <div class="mt-2 max-h-72 overflow-y-auto">
                <table class="table table-pin-rows table-sm">
                  <thead>
                    <tr><th>Time</th><th>Event</th><th>Source</th></tr>
                  </thead>
                  <tbody>
                    <template x-for="(e, i) in audit" :key="i">
                      <tr :class="e.event === 'auth_failure' ? 'text-error' : ''">
                        <td class="whitespace-nowrap" x-text="fmtTime(e.ts)"></td>
                        <td x-text="e.event"></td>
                        <td class="whitespace-nowrap" x-text="e.src_ip || '—'"></td>
                      </tr>
                    </template>
                    <template x-if="audit.length === 0 && !loadingAudit">
                      <tr><td colspan="3" class="text-center opacity-50">No events yet</td></tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Usage history -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <div class="flex items-center justify-between">
                <h2 class="card-title text-base">Usage history</h2>
                <button class="btn btn-ghost btn-sm" @click="loadUsage()" :disabled="loadingUsage">
                  <span x-show="loadingUsage" class="loading loading-spinner loading-xs"></span>
                  Refresh
                </button>
              </div>
              <p class="text-sm opacity-70">Screen-time and enforcement events, newest first.</p>
              <div class="mt-2 max-h-72 overflow-y-auto">
                <table class="table table-pin-rows table-sm">
                  <thead>
                    <tr><th>Time</th><th>Event</th><th>Detail</th></tr>
                  </thead>
                  <tbody>
                    <template x-for="(e, i) in usage" :key="i">
                      <tr>
                        <td class="whitespace-nowrap" x-text="fmtTime(e.ts)"></td>
                        <td x-text="e.event"></td>
                        <td x-text="usageDetail(e)"></td>
                      </tr>
                    </template>
                    <template x-if="usage.length === 0 && !loadingUsage">
                      <tr><td colspan="3" class="text-center opacity-50">No events yet</td></tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Change password -->
          <section class="card bg-base-100 shadow md:col-span-2">
            <div class="card-body">
              <h2 class="card-title text-base">Change password</h2>
              <p class="text-sm opacity-70">Update the control password without reinstalling.</p>
              <div class="mt-2 flex flex-wrap items-end gap-3">
                <label class="form-control">
                  <span class="label-text mb-1">Current</span>
                  <input type="password" x-model="pwCurrent" class="input input-bordered" placeholder="••••••••" />
                </label>
                <label class="form-control">
                  <span class="label-text mb-1">New</span>
                  <input type="password" x-model="pwNew" class="input input-bordered" placeholder="at least 10 chars" />
                </label>
                <button class="btn btn-primary" @click="changePassword()"
                        :disabled="savingPw || !pwCurrent || !pwNew">
                  <span x-show="savingPw" class="loading loading-spinner loading-sm"></span>
                  Update
                </button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </template>

    <!-- ── Confirm: kill ────────────────────────────────────────────── -->
    <div class="modal" :class="{ 'modal-open': killTarget }">
      <div class="modal-box">
        <h3 class="text-lg font-bold">Close app?</h3>
        <p class="py-2">
          Terminate <span class="font-semibold" x-text="killTarget?.name"></span>
          (PID <span x-text="killTarget?.pid"></span>)? Unsaved work may be lost.
        </p>
        <div class="modal-action">
          <button class="btn btn-ghost" @click="killTarget = null">Cancel</button>
          <button class="btn btn-error" @click="killProcess()">Kill</button>
        </div>
      </div>
    </div>

    <!-- ── Confirm: shutdown ────────────────────────────────────────── -->
    <div class="modal" :class="{ 'modal-open': confirmShutdown }">
      <div class="modal-box">
        <h3 class="text-lg font-bold">Shut down this PC?</h3>
        <p class="py-2">The machine will power off in a few seconds.</p>
        <div class="modal-action">
          <button class="btn btn-ghost" @click="confirmShutdown = false">Cancel</button>
          <button class="btn btn-warning" @click="doShutdown()">Shut down</button>
        </div>
      </div>
    </div>

    <!-- ── Toasts ───────────────────────────────────────────────────── -->
    <div class="toast toast-end">
      <template x-for="t in toasts" :key="t.id">
        <div class="alert" :class="t.cls" x-text="t.msg"></div>
      </template>
    </div>

    <style>
      [x-cloak] { display: none !important; }
    </style>

    <script>
      function app() {
        return {
          authed: null,
          busy: false,
          password: "",
          loginError: "",
          processes: [],
          loadingProcs: false,
          shotUrl: null,
          loadingShot: false,
          autoRefresh: false,
          _shotTimer: null,
          _refreshMs: 3000,
          killTarget: null,
          confirmShutdown: false,
          curfew: { enabled: false, start: "22:00", end: "07:00", warn_secs: 60, windows: [] },
          savingCurfew: false,
          rules: { enabled: true, daily_budget_mins: 0, budget_by_weekday: null, blocklist: [], app_limits: {}, app_groups: [], warn_secs: 60, budget_action: "lock" },
          appLimitRows: [],
          groupRows: [],
          savingRules: false,
          today: { day: null, enabled: true, budget_mins: 0, used_mins: 0, remaining_mins: null, extra_mins: 0, per_app: [], groups: [] },
          loadingToday: false,
          grantingExtra: false,
          _lastPerDay: null, // remembers the per-day array while single-limit mode is active
          audit: [],
          loadingAudit: false,
          usage: [],
          loadingUsage: false,
          timeRequests: [],
          codes: [],
          loadingCodes: false,
          newCodeMins: 30,
          issuingCode: false,
          pwCurrent: "",
          pwNew: "",
          savingPw: false,
          toasts: [],

          async init() {
            try {
              const r = await fetch("/session");
              const j = await r.json();
              this.authed = !!j.authenticated;
            } catch {
              this.authed = false;
            }
            if (this.authed) this.loadAll();
          },

          // Load every dashboard panel — used by both init() and a fresh login() so the two
          // entry points can't drift.
          loadAll() {
            this.loadProcesses();
            this.loadCurfew();
            this.loadRules();
            this.loadToday();
            this.loadAudit();
            this.loadUsage();
            this.loadTimeRequests();
            this.loadCodes();
          },

          async loadCurfew() {
            try {
              const r = await fetch("/api/curfew");
              if (r.ok) {
                this.curfew = await r.json();
                if (!this.curfew.windows) this.curfew.windows = [];
              }
            } catch {}
          },

          addWindow() {
            this.curfew.windows.push({
              start: "22:00",
              end: "07:00",
              days: { mon: false, tue: false, wed: false, thu: false, fri: false, sat: false, sun: false },
            });
          },

          removeWindow(i) {
            this.curfew.windows.splice(i, 1);
          },

          async saveCurfew() {
            this.savingCurfew = true;
            try {
              const r = await this.postJSON("/api/curfew", this.curfew);
              if (r.ok) {
                this.toast("Curfew saved", "success");
              } else if (r.status === 400) {
                this.toast("Invalid times — use HH:MM", "error");
              } else {
                this.toast("Could not save curfew", "error");
              }
            } catch {
              this.toast("Save request failed", "error");
            } finally {
              this.savingCurfew = false;
            }
          },

          async loadRules() {
            try {
              const r = await fetch("/api/rules");
              if (r.ok) {
                this.rules = await r.json();
                if (!this.rules.blocklist) this.rules.blocklist = [];
                if (!this.rules.app_limits) this.rules.app_limits = {};
                if (!this.rules.app_groups) this.rules.app_groups = [];
                // Expand the app_limits map into editable rows.
                this.appLimitRows = Object.entries(this.rules.app_limits)
                  .map(([name, mins]) => ({ name, mins }));
                // Expand groups into editable rows (apps shown as a comma-separated string).
                this.groupRows = this.rules.app_groups.map((g) => ({
                  name: g.name, appsText: (g.apps || []).join(", "), limit_mins: g.limit_mins,
                }));
              }
            } catch {}
          },

          // Switch between one everyday limit and a per-weekday array. Toggling on restores the
          // last per-day array if there is one (so an accidental off→on round-trip doesn't wipe a
          // weekend config), otherwise seeds all 7 days from the current everyday value.
          togglePerDay(on) {
            if (on) {
              const base = this.rules.daily_budget_mins || 0;
              this.rules.budget_by_weekday = this._lastPerDay || [base, base, base, base, base, base, base];
            } else {
              this._lastPerDay = this.rules.budget_by_weekday ? [...this.rules.budget_by_weekday] : null;
              this.rules.budget_by_weekday = null;
            }
          },

          async saveRules() {
            this.savingRules = true;
            // Collapse editable rows back into the app_limits map (skip blank names).
            this.rules.app_limits = {};
            for (const row of this.appLimitRows) {
              const name = (row.name || "").trim();
              if (name) this.rules.app_limits[name] = row.mins || 0;
            }
            this.rules.blocklist = this.rules.blocklist.map((b) => b.trim()).filter(Boolean);
            // Collapse group rows: split the apps text on commas/whitespace, drop empty groups.
            this.rules.app_groups = this.groupRows
              .map((g) => ({
                name: (g.name || "").trim(),
                apps: (g.appsText || "").split(/[,\s]+/).map((a) => a.trim()).filter(Boolean),
                limit_mins: g.limit_mins || 0,
              }))
              .filter((g) => g.name && g.apps.length);
            try {
              const r = await this.postJSON("/api/rules", this.rules);
              if (r.ok) {
                this.toast("Rules saved", "success");
                this.loadToday(); // keep the Today card (budget/paused badge) in sync
              } else if (r.status === 400) {
                this.toast("Warning seconds must be ≤ 600", "error");
              } else {
                this.toast("Could not save rules", "error");
              }
            } catch {
              this.toast("Save request failed", "error");
            } finally {
              this.savingRules = false;
            }
          },

          async login() {
            this.busy = true;
            this.loginError = "";
            try {
              const r = await this.postJSON("/login", { password: this.password });
              if (r.ok) {
                this.password = "";
                this.authed = true;
                this.loadAll();
              } else if (r.status === 429) {
                this.loginError = "Too many attempts — wait a minute and try again.";
              } else {
                this.loginError = "Incorrect password.";
              }
            } catch {
              this.loginError = "Could not reach the server.";
            } finally {
              this.busy = false;
            }
          },

          async logout() {
            this.stopAutoRefresh();
            await fetch("/logout", { method: "POST" });
            this.authed = false;
            this.processes = [];
            if (this.shotUrl) { URL.revokeObjectURL(this.shotUrl); this.shotUrl = null; }
          },

          async loadProcesses() {
            this.loadingProcs = true;
            try {
              const r = await fetch("/api/processes");
              if (r.status === 401) { this.authed = false; return; }
              this.processes = await r.json();
            } catch {
              this.toast("Failed to load processes", "error");
            } finally {
              this.loadingProcs = false;
            }
          },

          async takeScreenshot(silent = false) {
            if (!silent) this.loadingShot = true;
            try {
              const r = await fetch("/api/screenshot");
              if (r.status === 401) { this.authed = false; this.stopAutoRefresh(); return; }
              if (!r.ok) throw new Error();
              const blob = await r.blob();
              if (this.shotUrl) URL.revokeObjectURL(this.shotUrl);
              this.shotUrl = URL.createObjectURL(blob);
            } catch {
              if (!silent) this.toast("Screenshot failed", "error");
            } finally {
              if (!silent) this.loadingShot = false;
            }
          },

          toggleAutoRefresh() {
            if (this.autoRefresh) {
              this.takeScreenshot();
              this._shotTimer = setInterval(() => this.takeScreenshot(true), this._refreshMs);
            } else {
              this.stopAutoRefresh();
            }
          },

          stopAutoRefresh() {
            if (this._shotTimer) { clearInterval(this._shotTimer); this._shotTimer = null; }
            this.autoRefresh = false;
          },

          askKill(p) { this.killTarget = p; },

          async killProcess() {
            const p = this.killTarget;
            this.killTarget = null;
            if (!p) return;
            try {
              const r = await fetch(`/api/processes/${p.pid}/kill`, { method: "POST" });
              if (r.ok) {
                this.toast(`Closed ${p.name}`, "success");
                this.loadProcesses();
              } else {
                this.toast(`Could not close ${p.name}`, "error");
              }
            } catch {
              this.toast("Kill request failed", "error");
            }
          },

          async doShutdown() {
            this.confirmShutdown = false;
            try {
              const r = await fetch("/api/shutdown", { method: "POST" });
              this.toast(r.ok ? "Shutting down…" : "Shutdown failed", r.ok ? "success" : "error");
            } catch {
              this.toast("Shutdown request failed", "error");
            }
          },

          async doLock() {
            try {
              const r = await fetch("/api/lock", { method: "POST" });
              this.toast(r.ok ? "Screen locked" : "Lock failed", r.ok ? "success" : "error");
            } catch {
              this.toast("Lock request failed", "error");
            }
          },

          async changePassword() {
            this.savingPw = true;
            try {
              const r = await this.postJSON("/api/password", { current: this.pwCurrent, new: this.pwNew });
              if (r.ok) {
                this.toast("Password changed", "success");
                this.pwCurrent = "";
                this.pwNew = "";
              } else if (r.status === 401) {
                this.toast("Current password is wrong", "error");
              } else if (r.status === 400) {
                this.toast("New password too short (min 10)", "error");
              } else {
                this.toast("Could not change password", "error");
              }
            } catch {
              this.toast("Password request failed", "error");
            } finally {
              this.savingPw = false;
            }
          },

          toast(msg, kind) {
            const id = (this._n = (this._n || 0) + 1);
            const cls = { success: "alert-success", error: "alert-error", info: "alert-info" }[kind] || "alert-info";
            this.toasts.push({ id, msg, cls });
            setTimeout(() => { this.toasts = this.toasts.filter((t) => t.id !== id); }, 3500);
          },

          // POST a JSON body; the caller inspects the returned Response for status handling.
          postJSON(url, body) {
            return fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
          },

          // GET a list into `this[field]`. `flag` (optional) toggles a loading spinner; `errMsg`
          // (optional) toasts on failure. Logs out on 401.
          async loadList(url, field, flag, errMsg) {
            if (flag) this[flag] = true;
            try {
              const r = await fetch(url);
              if (r.status === 401) { this.authed = false; return; }
              if (r.ok) this[field] = await r.json();
            } catch {
              if (errMsg) this.toast(errMsg, "error");
            } finally {
              if (flag) this[flag] = false;
            }
          },

          loadAudit() { return this.loadList("/api/audit", "audit", "loadingAudit", "Failed to load access log"); },
          loadUsage() { return this.loadList("/api/usage", "usage", "loadingUsage", "Failed to load usage history"); },
          loadToday() { return this.loadList("/api/usage/today", "today", "loadingToday"); },

          async grantExtra(mins) {
            this.grantingExtra = true;
            try {
              const r = await this.postJSON("/api/extra-time", { minutes: mins });
              if (r.ok) {
                this.toast(`Granted +${mins} min`, "success");
                this.loadToday();
                this.loadUsage();
              } else if (r.status === 400) {
                this.toast("Minutes out of range (1–240)", "error");
              } else {
                this.toast("Could not grant time", "error");
              }
            } catch {
              this.toast("Request failed", "error");
            } finally {
              this.grantingExtra = false;
            }
          },
          loadTimeRequests() { return this.loadList("/api/time-requests", "timeRequests"); },
          loadCodes() { return this.loadList("/api/time-codes", "codes", "loadingCodes"); },

          async issueCode() {
            this.issuingCode = true;
            try {
              const r = await this.postJSON("/api/time-codes", { minutes: this.newCodeMins });
              if (r.ok) {
                const j = await r.json().catch(() => ({}));
                this.toast(`Code ${j.code} = ${j.minutes} min`, "success");
                this.loadCodes();
              } else if (r.status === 400) {
                this.toast("Minutes 1–240, and at most 50 active codes", "error");
              } else {
                this.toast("Could not generate a code", "error");
              }
            } catch {
              this.toast("Request failed", "error");
            } finally {
              this.issuingCode = false;
            }
          },

          async copyCode(code) {
            try {
              await navigator.clipboard.writeText(code);
              this.toast("Code copied", "success");
            } catch {
              this.toast("Copy failed — select it manually", "error");
            }
          },

          async resolveTimeRequest(id, approve) {
            const verb = approve ? "approve" : "deny";
            try {
              const r = await fetch(`/api/time-requests/${id}/${verb}`, { method: "POST" });
              if (r.ok) {
                const j = await r.json().catch(() => ({}));
                this.toast(approve ? `Granted ${j.minutes ?? ""} min` : "Denied", "success");
                this.loadTimeRequests();
                if (approve) this.loadUsage();
              } else {
                this.toast("Could not update the request", "error");
              }
            } catch {
              this.toast("Request failed", "error");
            }
          },

          usageDetail(e) {
            if (e.event === "screentime_daily")
              return `${e.minutes_used ?? "?"}/${e.budget ?? "?"} min`;
            if (e.reason) return e.reason;
            if (e.minutes != null) return `${e.minutes} min`;
            return "—";
          },

          fmtTime(ts) {
            if (!ts) return "—";
            const d = new Date(ts);
            return isNaN(d.getTime()) ? ts : d.toLocaleString();
          },

          fmtBytes(b) {
            if (!b) return "—";
            const u = ["B", "KB", "MB", "GB"];
            let i = 0;
            while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
            return `${b.toFixed(i ? 1 : 0)} ${u[i]}`;
          },
        };
      }
    </script>
  </body>
</html>
