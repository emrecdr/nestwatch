name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast formatting gate (toolchain pinned via rust-toolchain.toml, so this is deterministic).
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Cross-platform test: handlers/auth/config/curfew run on the FakeControl path, so the
  # suite is meaningful on both Linux and Windows.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `ring` (rustls crypto provider) assembles its primitives with NASM on the MSVC
      # target; it isn't reliably preinstalled on windows-latest. (Perl is.)
      - name: Install NASM (Windows, for ring)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend CSS
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets

  # Supply-chain advisory scan. Non-blocking (informational) so an upstream advisory doesn't
  # wedge unrelated work; review its output when it flags something.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Assessed-and-accepted transitive advisories: quick-xml RUSTSEC-2026-0194/-0195
      # (DoS parsing untrusted XML) are reachable only through xcap's Linux/Wayland backend,
      # which is never compiled — xcap is a Windows-only dependency and its Windows backend
      # doesn't use quick-xml, so quick-xml only appears in Cargo.lock, never in a build. The
      # app also parses no untrusted XML. Everything else (incl. the paste "unmaintained"
      # warning) is still reported.
      - run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  # Produce the shippable Windows .exe. Only on main / tags (not every branch/PR push).
  windows-release:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NASM (for ring)
        uses: ilammy/setup-nasm@v1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend CSS
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Build release binary
        run: cargo build --release --locked
      - uses: actions/upload-artifact@v5
        with:
          name: nestwatch-windows-exe
          path: target/release/nestwatch.exe
